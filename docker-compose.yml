services:
  postgres:
    image: postgres:16
    container_name: pf-os-postgres
    environment:
      POSTGRES_DB: pfos
      POSTGRES_USER: pfos
      POSTGRES_PASSWORD: pfos_local_dev
    ports:
      - "5432:5432"
    volumes:
      - pf-os-postgres-data:/var/lib/postgresql/data

volumes:
  pf-os-postgres-data:
