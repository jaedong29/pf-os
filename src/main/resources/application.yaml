spring:
  application:
    name: pf-os
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pfos}
    username: ${DB_USER:pfos}
    password: ${DB_PASSWORD:pfos_local_dev}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: ${JWT_SECRET:dev-only-secret-please-override-in-application-secret-yaml}
  expiration: 3600000
